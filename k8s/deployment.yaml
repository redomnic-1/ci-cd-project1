apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels: {app: myapp}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: myapp}
    spec:
      containers:
      - name: myapp
        image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest
        ports: [{containerPort: 8080}]
        resources:
          requests: {cpu: "200m", memory: "256Mi"}
          limits:   {cpu: "500m", memory: "512Mi"}
        readinessProbe:
          httpGet: {path: /actuator/health, port: 8080}
          initialDelaySeconds: 20
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /actuator/health, port: 8080}
          initialDelaySeconds: 40
          periodSeconds: 10
